<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>khalis khaleel</title>
    <style>
        :root {
            --bg: #ffffff;
            --text-primary: #000000;
            --text-secondary: #888888;
            --accent: #eeeeee;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding: 60px;
            box-sizing: border-box;
            text-transform: lowercase;
            overflow: hidden;
        }

        header h1 {
            font-size: 3.5rem; /* Increased size as requested */
            font-weight: normal;
            margin: 0;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .main-content {
            max-width: 700px;
            margin-top: -10vh; /* Visual balance */
        }

        .bio {
            font-size: 1.4rem;
            line-height: 1.4;
            color: var(--text-primary);
            margin-bottom: 50px;
        }

        .bio span {
            color: var(--text-secondary);
            display: block;
            margin-top: 15px;
            font-size: 1rem;
            letter-spacing: 0.05em;
            max-width: 500px;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        nav a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.6rem;
            width: fit-content;
            position: relative;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
        }

        /* The Index Number */
        nav a span {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-right: 15px;
            letter-spacing: 0;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--text-primary);
            transition: width 0.3s;
        }

        nav a:hover {
            color: var(--text-secondary);
            transform: translateX(10px);
        }

        nav a:hover::after {
            width: 100%;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            border-top: 1px solid var(--accent);
            padding-top: 20px;
        }

        .coord {
            font-family: monospace;
        }

        /* Subtle background texture */
        .grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--accent) 0.5px, transparent 0.5px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            body { padding: 30px; }
            header h1 { font-size: 2.5rem; }
            .bio { font-size: 1.1rem; }
            nav a { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="grid"></div>

    <header>
        <h1>khalis khaleel</h1>
    </header>

    <div class="main-content">
        <div class="bio">
            engineer based in montréal. 
            <span></span>
        </div>

        <nav>
            <!-- [LINK LOGIC] These paths assume the folders exist in your repo -->
            <a href="boids/"><span>01</span> boids</a>
            <a href="matl_me/"><span>02</span> matl_me</a>
        </nav>
    </div>

    <footer>
      
    </footer>

</body>
</html>
